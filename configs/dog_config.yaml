seed : 1
device : "cuda"

#dataset
train_data_root : 'unpaired_image_data/dog/train'
train_latent_data : 'merged_latents_forwards/dog_train_latents.pt'
train_embedding_data : 'merged_latents_forwards/dog_train_embeddings.pt'
eval_data_root : 'unpaired_image_data/dog/valid'
eval_latent_data : 'merged_latents_forwards/dog_valid_latents.pt'
eval_embedding_data : 'merged_latents_forwards/dog_valid_embeddings.pt'
data_length : 1000
batch_size : 5
learning_rate : 2.0e-7
lr_lambda : 0.8
origin_alpha : 0 
Attention : False

model:
    init_g : 50.0
    divide_out : 0.1
    num_guidance_info : 1
    hidden_dim : 768
    num_layers : 5
    heads : 4
    length : 2

loss:
    negative_prompt: 'blurry, low resolution, distortion'
    lambda_text : 0.5
    lambda_structure : 0.075
    lambda_mean : 0.5
    lambda_negative : 1.0
    dino_threshold : 0.0
    num_condition : 1
    pnp_injection_rate : 0.7
    clip_ds_use : False
    negative_clip_use : True
    image_size : 512
    gradient : 'decrease'
    schedule_method : 'cosine'


