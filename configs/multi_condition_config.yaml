seed : 1
device : "cuda"

#dataset
train_data_root : './image_data/train'
train_latent_data : 'merged_latents_forwards/train_latents.pt'
train_embedding_data : 'merged_latents_forwards/street_train_embeddings.pt'
eval_data_root : './image_data/eval'
eval_latent_data : 'merged_latents_forwards/eval_latents.pt'
eval_embedding_data : 'merged_latents_forwards/street_eval_embeddings.pt'
data_length : 1000
batch_size : 5
learning_rate : 0.0001
lr_lambda : 0.9
origin_alpha : 0 
model_zero_init : False
attention_model : True
model:
    init_g : 100.0
    divide_out : 0.2
    num_guidance_info : 1
    hidden_dim : 768
    num_layers : 3
    hidden_act : "gelu"
    heads : 8

loss:
    negative_prompt: 'ugly, blurry, low resolution, unrealistic, paint, distortion'
    lambda_text : 1.0
    lambda_structure : 0.2
    dino_threshold : 0.0
    num_condition : 2
    pnp_injection_rate : 0.9
    dino_loss_use : True
    clip_ds_use : True
    negative_clip_use : True
    gradient : 'decrease'
    schedule_method : 'cosine'







